[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --alluredir=reports/allure-results
    --clean-alluredir

log_cli = true
log_cli_level = INFO
log_format = [%(asctime)s] %(levelname)-8s %(name)s | %(message)s
log_date_format = %H:%M:%S
